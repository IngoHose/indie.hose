<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="author" content="Marco Puttkammer">
  <meta name="description" content="Dies ist die Blogseite des Radioprojekts indie.hose. Hier finden sich verschiedenste Artikel rund um Musik, Künstler, Alben, Konzerte, Playlists oder aktuelle Entwicklungen des Musikmarkts.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>indie.hose</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/list.css">
  <link rel="stylesheet" href="css/hoeren.css">
  <link rel="stylesheet" href="css/alternative-layout.css">

</head>
<body>

  <header id="main-header">
    <div class="header-top">
      <h1><a href="index.html">indie.hose</a></h1>
      <div id="hamburger">&#9776;</div>
    </div>

    <hr class="hr1">

    <nav id="main-nav">
      <a href="hoeren.html">Hören</a>
      <a href="archiv.html">Lesen</a>
      <a href="sendeplan.html">Sendeplan</a>
      <a href="about.html">Über uns</a>
    </nav>
    
  </header>

  <div id="overlay-nav" aria-hidden="true">
    <button id="close-overlay" aria-label="Menü schließen">&times;</button>
    <nav id="overlay-menu"></nav>
  </div>

  <div class="player">
      <a class="play-button" href="https://laut.fm/indie-hose" target="_blank">▶</a>
      <div class="now-playing-label">Jetzt läuft:</div>
      <div class="song-scroll-container">
          <div class="song-title" id="currentSong">Lädt...</div>
      </div>
    </div>

  <main>
  
  <div class="hero-section">
    <div class="hero-content">
      <div class="hero-article">
        <div class="hero-meta">
          <img src="" alt="" class="hero-image">    
          <div class="hero-text">
            <h2 class="artist"></h2> 
            <h2 class="title"></h2>
            <h3 class="headline"></h3>
            <p class="intro-text"></p>
            <button class="hero-cta">Weiterlesen</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="content-grid">
    
    <section class="trending-section">
      <div class="section-header">
        <h2>🔥 Trending</h2>
        <div class="section-divider"></div>
      </div>
      <div class="trending-cards">
        <div class="cards-container">

        </div>
      </div>
    </section>

    <section class="sidebar-section">
      <div class="release-calendar-compact">
        <h3 class="sidebar-title">📅 Release-Kalender</h3>
        
        <div class="calendar-nav">
          <button class="nav-btn" id="prev-month" aria-label="Vorheriger Monat">‹</button>
          <div class="current-month" id="current-month-display">November 2024</div>
          <button class="nav-btn" id="next-month" aria-label="Nächster Monat">›</button>
        </div>

        <div id="release-list" class="release-list-compact">
          <div class="loading">Lädt Releases...</div>
        </div>
        
      </div>
    </section>

  </div>

  <section class="full-width-section">
    <div class="featured-grid">
      <div class="featured-header">
        <h2>✨ Featured</h2>
        <div class="featured-divider"></div>
      </div>
      <div class="featured-cards">
        <!-- Additional featured content will be loaded here -->
      </div>
    </div>
  </section>
  
</main>

<footer>
  <ul>
    <li>2026 indie.hose</li>
    <li><a href="impressum.html">Impressum</a></li>
    <li><a href="datenschutz.html">Datenschutz</a></li>
  </ul>
</footer>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="js/loadContent.js"></script>
<script src="js/release-calendar-list.js"></script>
<script data-name="BMC-Widget" data-cfasync="false" src="https://cdnjs.buymeacoffee.com/1.0.0/widget.prod.min.js"
  data-id="indie.hose" data-description="Support me on Buy me a coffee!" data-color="#BD5FFF" data-position="Right"
  data-x_margin="10" data-y_margin="10"></script>
<script src="js/script.js"></script>
</body>

</html>
